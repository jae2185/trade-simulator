<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0d1520"/>
  <!-- Axes -->
  <line x1="5" y1="27" x2="27" y2="27" stroke="#2a3a4a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5" y1="27" x2="5" y2="5" stroke="#2a3a4a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- PPF arc -->
